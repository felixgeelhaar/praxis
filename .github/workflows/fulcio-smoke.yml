name: Fulcio E2E Smoke

# Manually triggered end-to-end check that exercises the full keyless
# pipeline: cosign signs a binary against Fulcio (production Sigstore
# infrastructure) using the workflow's GitHub OIDC token, downloads
# the production Fulcio root, and runs the praxis VerifyKeyless path
# against the resulting cert + sig pair.
#
# Run via Actions tab → "Fulcio E2E Smoke" → "Run workflow."
#
# Phase 6 t-fulcio-verifier / t-fulcio-config validation.

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required so cosign can mint a Fulcio cert.

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Produce a fake plugin artefact
        run: |
          mkdir -p /tmp/plugin
          printf 'praxis fulcio smoke %s\n' "${GITHUB_SHA}" > /tmp/plugin/plugin.so

      - name: Sign with cosign sign-blob (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign-blob \
            --yes \
            --output-signature /tmp/plugin/plugin.so.sig \
            --output-certificate /tmp/plugin/plugin.so.cert \
            /tmp/plugin/plugin.so

      - name: Fetch production Fulcio root + intermediate
        run: |
          # Production Fulcio leaves are issued by the intermediate,
          # not the root. The verifier wants the self-signed root in
          # FulcioRoots and the intermediate in Intermediates so x509
          # chain verification builds a valid path.
          base="https://raw.githubusercontent.com/sigstore/root-signing/main/targets"
          curl -fsSL -o /tmp/fulcio_root.pem "${base}/fulcio_v1.crt.pem"
          curl -fsSL -o /tmp/fulcio_intermediate.pem "${base}/fulcio_intermediate_v1.crt.pem"
          test -s /tmp/fulcio_root.pem
          test -s /tmp/fulcio_intermediate.pem

      - name: Run praxis VerifyKeyless against the signed artefact
        run: |
          go run ./cmd/fulcio-smoke \
            --artifact /tmp/plugin/plugin.so \
            --fulcio-root /tmp/fulcio_root.pem \
            --fulcio-intermediate /tmp/fulcio_intermediate.pem \
            --subject-glob "https://github.com/${GITHUB_REPOSITORY}/*" \
            --issuer "https://token.actions.githubusercontent.com"
