name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: fmt + vet + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          check-latest: true
          cache: true

      - name: go mod tidy (no diff)
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: gofmt (no diff)
        run: |
          gofmt -l . | tee /tmp/fmt.out
          test ! -s /tmp/fmt.out

      - name: go vet
        run: go vet ./...

      - name: go test (race)
        run: go test -race -count=1 ./...

      - name: go build
        run: make build

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          check-latest: true
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5.0
          args: --timeout=5m

  postgres-integration:
    name: postgres integration suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: praxis
          POSTGRES_PASSWORD: praxis
          POSTGRES_DB: praxis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U praxis"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          check-latest: true
          cache: true
      - name: integration tests
        env:
          PRAXIS_TEST_POSTGRES_DSN: postgres://praxis:praxis@127.0.0.1:5432/praxis_test?sslmode=disable
        run: go test -tags=integration -race -count=1 ./internal/store/postgres/...
