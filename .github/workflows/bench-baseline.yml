name: Bench Baseline Refresh

# Regenerates bench/baseline.txt on the same runner class that
# bench-publish.yml uses, so `make bench-check` compares apples to
# apples instead of "developer M5 vs ubuntu-latest." Opens a PR with
# the new snapshot for review — the maintainer merges when CPU /
# memory characteristics of the runner have demonstrably shifted, or
# on a periodic cadence.
#
# Trigger: manual (workflow_dispatch) or weekly cron.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run benchmarks
        run: |
          mkdir -p bench
          go test -run=^$ -bench=. -benchmem -count=5 -benchtime=1s ./internal/executor/... ./internal/plugin/... 2>&1 | tee bench/baseline.txt

      - name: Open PR with refreshed baseline
        uses: peter-evans/create-pull-request@v8
        with:
          branch: bench/baseline-refresh
          delete-branch: true
          title: "chore(bench): refresh baseline snapshot from CI runner"
          body: |
            Auto-generated baseline regeneration from `ubuntu-latest` runner.
            Compare against the previous baseline before merging — only
            adopt when the runner's CPU / memory profile has shifted in a
            way that justifies a new floor.
          commit-message: "chore(bench): refresh baseline snapshot"
          add-paths: bench/baseline.txt
