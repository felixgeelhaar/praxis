id: Praxis
title: Praxis
description: Execution layer of the four-system cognitive stack (Mnemos, Chronos, Nous, Praxis). Exposes a registry of capabilities and executes actions under policy with idempotency, dry-run, and audit. Praxis does not decide; that belongs to Nous. This spec covers Phase 1 (MVP), Phase 2 (Policy & Resilience) and Phase 3 (Capability Ecosystem) per Roadmap.md.
features:
    - id: f1-foundation-scaffolding
      title: Foundation Scaffolding
      description: Repo scaffolding to make the documented patterns runnable. Go module pinned to Mnemos foundation library versions (bolt, fortify, mcp-go, statekit, axi-go), Makefile mirroring Mnemos targets, sqlc.yaml for sqlite + postgres engines, .gitignore, .editorconfig, .golangci.yml, MIT LICENSE.
      requirements: []
    - id: f2-domain-storage-foundation
      title: Domain and Storage Foundation
      description: DDD domain types (Capability, Action, Result, Simulation, PolicyDecision, CallerRef, ActionError, AuditEvent), statekit-backed Action lifecycle FSM, repository ports, and three storage backends (memory as canonical reference, sqlite local-first, postgres production) behind a shared store contract test suite. Backend selection via PRAXIS_DB_TYPE / PRAXIS_DB_CONN.
      requirements: []
    - id: f3-capability-registry
      title: Capability Registry and Schema Validation
      description: In-process CapabilityRegistry with programmatic Register(handler), and a schema validator gating every Execute and DryRun. Validates Action.Payload against InputSchema before any side effect and handler Output against OutputSchema after execution. Supports JSON Schema and Go-struct registration.
      requirements: []
    - id: f4-executor
      title: Executor (Execute and DryRun)
      description: Linear executor flow per TDD section 5 - resolve capability, validate schema, evaluate policy, check idempotency, run handler with timeout and panic recovery, persist result and audit, emit outcome. Phase-1 PolicyEngine is a global allow-list with explainable PolicyDecision recorded on every action. Status transitions go through the statekit FSM.
      requirements: []
    - id: f5-audit-log
      title: Audit Log
      description: Append-only record of every action lifecycle event (received, validated, policy, executed, succeeded, failed, simulated). Search by capability, caller, time window, action ID. Replay-from-audit canary test reconstructs an action's full lifecycle from audit_events alone and must always pass.
      requirements: []
    - id: f6-real-handlers
      title: Real Capability Handlers
      description: Two production-quality handlers proving the abstraction. send_message via Slack Web API forwarding client_msg_id for idempotency. send_email via SMTP with deterministic Message-ID. Vendor-sandboxed integration tests skipped without credentials. Errors classified as retryable vs non-retryable.
      requirements: []
    - id: f7-outcome-writeback
      title: Outcome Writeback to Mnemos
      description: After every terminal action, post a praxis.action_completed event to Mnemos so the cognitive loop closes. fortify/retry with Mnemos-equivalent defaults (5xx + 429 retry, 4xx fail fast, exponential backoff with jitter). Outbox-and-retry on Mnemos unavailability; never block Execute. Configurable via PRAXIS_MNEMOS_URL / PRAXIS_MNEMOS_TOKEN.
      requirements: []
    - id: f8-http-api-cli
      title: HTTP API and CLI
      description: Public surface for callers - axi-go HTTP server (cmd/praxis/axikernel.go mirroring Mnemos's axikernel pattern) and CLI wrapping the same executor. Endpoints GET /health, GET /v1/capabilities, GET /v1/capabilities/{name}, POST /v1/actions, GET /v1/actions/{id}, POST /v1/actions/{id}/dry-run, GET /v1/audit. CLI commands praxis caps list/show, praxis run, praxis log show, praxis serve. Structured logs via bolt; basic Prometheus metrics.
      requirements: []
    - id: f9-public-client
      title: Public Go Client
      description: Typed Go client for callers, mirroring Mnemos client patterns. New constructor accepting WithToken, WithLogger (bolt), WithRetry (fortify). Methods ListCapabilities, Execute, DryRun, GetAction. APIError type with status + message, errors.As-friendly. Safe for concurrent use.
      requirements: []
    - id: f10-policy-engine-v2
      title: Policy Engine v2 - Default-Deny + Ordered Rules (Phase 2 M2.1)
      description: Phase-2 PolicyEngine adds default-deny mode (controlled by PRAXIS_POLICY_MODE), explicit first-match-wins ordering with PolicyRule.Priority, and fail-closed behaviour on PolicyRepo errors. Every Execute and DryRun records the matched rule on the action.
      requirements: []
    - id: f11-async-actions
      title: Async Actions with At-Least-Once Drainer (Phase 2 M2.2)
      description: Action.Mode = sync | async. Async submissions persist as validated and return 202 Accepted; jobs.Runner drains validated/async rows from the actions table and resumes through Executor.Resume. At-least-once delivery is safe via the IdempotencyKeeper. Status pollable via GET /v1/actions/{id}.
      requirements: []
    - id: f12-per-cap-retry
      title: Per-Capability Retry Configuration (Phase 2 M2.3)
      description: HandlerRunner.RunWithCapability builds a per-call fortify retry strategy from Capability.Retry (MaxAttempts, InitialDelay, MaxDelay, Multiplier), falling back to the global strategy when nil. The IsRetryable classifier is shared so semantics stay consistent across capabilities.
      requirements: []
    - id: f13-rate-limiting
      title: Per-Capability + Per-Caller Rate Limiting (Phase 2 M2.4)
      description: fortify/ratelimit token bucket per (capability, caller) key. Capability.RateLimit declares Rate / Burst / Interval. Throttled actions emit policy_throttled audit events with retry_after_ms and are rejected with code rate_limited; the handler is never invoked.
      requirements: []
    - id: f14-more-handlers
      title: Additional Capability Handlers (Phase 2 M2.6)
      description: Generic http_request handler shipped (any HTTP endpoint, idempotency-key forwarding). Pending vendor handlers - GitHub create_issue and comment, Linear/Jira create_issue and transition, Calendar schedule and invite.
      requirements: []
    - id: f15-vendor-retry-after
      title: Vendor Retry-After Parsing (Phase 2 polish)
      description: Parse the vendor Retry-After header (delta-seconds or HTTP-date) on 429/503 responses and surface to the retry strategy so the next attempt waits at least that long. Wire through handlerrunner so all handlers benefit without per-handler code.
      requirements: []
    - id: f16-async-webhooks
      title: Async Completion Webhook Delivery (Phase 2 polish)
      description: Action carries an optional callback_url. After an async action reaches a terminal status, post the Result to that URL with HMAC-SHA256 signature. Reuses the outcome outbox machinery for retry on 5xx + 429.
      requirements: []
    - id: f17-plugin-architecture
      title: Out-of-Tree Plugin Architecture (Phase 3 M3.1)
      description: Stable handler ABI so third-party capability handlers can ship as separate Go modules or compiled plugins. On-disk discovery, signature verification (cosign-compatible), and a sandbox boundary enforcing CPU, memory, and network egress limits.
      requirements: []
    - id: f18-mcp-surface
      title: MCP Capability Surface (Phase 3 M3.2)
      description: mcp-go server exposing ListCapabilities as MCP tool discovery and Execute/DryRun as tool calls. Same executor as the HTTP surface so audit + policy are uniformly applied. Capability descriptors shaped for agent-go consumption with no bespoke glue.
      requirements: []
    - id: f19-multi-tenant-policy
      title: Multi-Tenant Policy and Audit (Phase 3 M3.3)
      description: Org / team / user scope hierarchy for policy rules and audit retention. Per-tenant capability registries so a tenant can register private capabilities. Per-tenant audit access controls so one tenant's audit is invisible to others.
      requirements: []
    - id: f20-reversibility
      title: Reversibility via Capability.Compensate (Phase 3 M3.4)
      description: Capability.Compensate(ctx, originalResult) for capabilities whose effects can be reversed. praxis revert <action-id> runs the compensating action under the same audit umbrella, linking parent and revert via audit. Best-effort flag for vendors that cannot exactly reverse.
      requirements: []
    - id: f21-compliance-governance
      title: Compliance, Audit Export, and PII Redaction (Phase 3 M3.5)
      description: Exportable audit (JSON, CSV) suitable for SOC 2 / HIPAA / GDPR review. Configurable PII redaction policy applied at audit detail level. Org-level dashboards covering capability usage, policy denials, and error rates.
      requirements: []
constraints: []
version: 0.2.0
